<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запись на консультацию — Nutritallinn</title>
  <meta name="description" content="Запишитесь на консультацию по питанию онлайн. Укажите контактные данные — специалист свяжется с вами в течение дня." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --warm-white: #FDFCFA;
      --dark: #1C1C1A;
      --muted: #6B6860;
      --accent: #C8A96E;
      --accent-light: #EFE5D3;
      --border: #E5E0D8;
    }

    body {
      font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: rgba(253,252,250,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 5vw;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Calibri', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
    }

    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--dark); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 5vw;
    }

    .form-card {
      background: var(--warm-white);
      width: 100%;
      max-width: 520px;
      padding: 3.5rem 3rem;
    }

    .plan-badge {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-light);
      padding: 0.35rem 0.9rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .plan-price {
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      background: var(--cream);
      font-family: inherit;
      font-size: 1rem;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #C0BBB3;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .submit-btn {
      width: 100%;
      margin-top: 2rem;
      padding: 1.1rem;
      background: var(--dark);
      color: var(--warm-white);
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s;
    }

    .submit-btn:hover { background: #333; }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .notice {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .cancelled-msg {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 0.8rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
      color: #856404;
    }

    @media (max-width: 540px) {
      .form-card { padding: 2rem 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Нутрициолог</a>
  <a href="/" class="nav-back">← Назад</a>
</nav>

<main>
  <div class="form-card">
    <div id="cancelledMsg" class="cancelled-msg" style="display:none;">
      Оплата была отменена. Попробуйте ещё раз.
    </div>
    <div id="errorMsg" class="cancelled-msg" style="display:none;">
      Неверные данные. Пожалуйста, проверьте форму и попробуйте ещё раз.
    </div>

    <div class="plan-badge" id="planBadge">Загрузка...</div>
    <h1 id="planTitle">Консультация</h1>
    <div class="plan-price" id="planPrice">—</div>
    <div class="divider"></div>

    <form id="orderForm" method="POST" action="/api/checkout">
      <input type="hidden" name="plan" id="planInput" value="" />

      <div class="form-row">
        <div class="form-group">
          <label for="name">Имя</label>
          <input type="text" id="name" name="name" placeholder="Мария" required />
        </div>
        <div class="form-group">
          <label for="surname">Фамилия</label>
          <input type="text" id="surname" name="surname" placeholder="Иванова" required />
        </div>
      </div>

      <div class="form-group">
        <label for="age">Возраст</label>
        <input type="number" id="age" name="age" placeholder="30" min="16" max="99" required />
      </div>

      <div class="form-group">
        <label for="phone">Телефон</label>
        <input type="tel" id="phone" name="phone" placeholder="+372 55 43 213" required />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="maria@gmail.com" required />
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Перейти к оплате
      </button>
    </form>

    <p class="notice">
      После оплаты специалист свяжется с вами по телефону и e-mail в течение дня.
    </p>
  </div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan') || '50';

  document.getElementById('planInput').value = plan;

  if (plan === '175') {
    document.getElementById('planBadge').textContent = 'Месяц поддержки';
    document.getElementById('planTitle').textContent = 'Месячное ведение';
    document.getElementById('planPrice').textContent = '175 €';
  } else {
    document.getElementById('planBadge').textContent = 'Разовая';
    document.getElementById('planTitle').textContent = 'Консультация по питанию';
    document.getElementById('planPrice').textContent = '50 €';
  }

  if (params.get('cancelled') === '1') {
    document.getElementById('cancelledMsg').style.display = 'block';
  }
  if (params.get('error') === '1') {
    document.getElementById('errorMsg').style.display = 'block';
  }

  document.getElementById('orderForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Переадресация...';
  });
</script>

</body>
</html>
